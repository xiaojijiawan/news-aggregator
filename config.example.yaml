# Copy this file to config.yaml and fill in your DeepSeek API key
deepseek:
  api_key: "__DEEPSEEK_API_KEY__"
  model: "deepseek-chat"

sources:
  cctv:
    rss: "https://news.cctv.com/2019/07/gaiban/cmsdatainterface/page/news_1.jsonp"
    name: "央视新闻"
  xinhua:
    rss: "http://www.news.cn/politics/xhjj.htm"
    name: "新华网"
  bilibili:
    rss: "https://api.bilibili.com/x/web-interface/search/square?limit=50"
    name: "哔哩哔哩热搜"
  toutiao:
    rss: "https://www.toutiao.com/hot-event/hot-board/?origin=toutiao_pc"
    name: "今日头条"
  wallstreetcn:
    rss: "https://api-one.wallstcn.com/apiv1/content/lives"
    name: "华尔街见闻"
  yicai:
    rss: "https://www.yicai.com/api/ajax/getlatest"
    name: "第一财经"

schedule:
  time: "08:30"

output:
  html_path: "./output/index.html"
