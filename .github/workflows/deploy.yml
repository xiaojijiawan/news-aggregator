name: Deploy static news dashboard

on:
  schedule:
    # 08:30 and 20:30 Beijing time = 00:30 and 12:30 UTC
    - cron: "30 0,12 * * *"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install httpx beautifulsoup4 jinja2

      - name: Generate static dashboard
        env:
          REPO_URL: https://github.com/${{ github.repository }}
          ACTIONS_URL: https://github.com/${{ github.repository }}/actions/workflows/deploy.yml
        run: python generate_static.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          publish_branch: gh-pages
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com
